spring.application.name=notebook-portal

# Database Configuration (defaults to H2 for local dev; set DB_URL for Postgres)
spring.datasource.url=${DB_URL:jdbc:h2:mem:notebook_portal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console (local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# File Storage
app.upload.dir=${UPLOAD_DIR:uploads}

# AI + OCR
app.ai.enabled=${AI_ENABLED:false}
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.openai.timeout-ms=${OPENAI_TIMEOUT_MS:12000}
app.ocr.enabled=${OCR_ENABLED:false}

# Upload Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

server.port=8080